{% extends "layout.html" %}

{% block title %}{% endblock %}

{% block content %}
  <style>
    summary {
       font-weight: bold;
    }
  </style>
  {% for item in items %}
  <details name="example" open>
    <summary>{{item.head}}</summary>
    <ul>
    {% for line in item.body %}
      {% if line[0] == '-' %}
        &nbsp;&nbsp;{{line | safe}}<br>
      {% else %} 
        <li>{{line | safe}}</li> 
      {% endif %}       
    {% endfor %}       
    </ul>
  </details>
  <hr />
  {% endfor %}
{% endblock %}
