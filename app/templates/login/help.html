{% extends "layout.html" %}

{% block title %}{% endblock %}

{% block content %}
  <style>
    summary {
      font-weight: bold;
      color: darkred !important;
    }
    summary small {
      font-size: small;
      font-weight:normal;
      color: black;
    }
  </style>
  {% for item in items %}
  <details name="example" open>
    <summary>{{item.head | safe}}</summary>
    <ul>
    {% for line in item.body %}
      {% if line[0] == '-' %}
        &nbsp;&nbsp;{{line | safe}}<br>
      {% else %} 
        <li>{{line | safe}}</li> 
      {% endif %}       
    {% endfor %}       
    </ul>
  </details>
  <hr />
  {% endfor %}
{% endblock %}
